[LiveFeed]
; -----------------------------------------------------------------------
; SD Trading System - AmiBroker Live Feed Bridge Configuration
; Replaces: system_config.ini (Fyers bridge settings)
; -----------------------------------------------------------------------

; Directory where AmiBroker AFL (SD_LiveFeed_Export.afl) writes per-symbol CSVs.
; Must match "Output Directory" set in AmiBroker Parameter dialog (Ctrl+R).
watch_dir    = D:\SD_System\LiveFeed\Data

; Directory where clean, engine-ready CSVs are written by this bridge.
; Your SD Trading Engine (C++) reads from here. One file per symbol: SYMBOL.csv
engine_dir   = D:\SD_System\EngineData

; Bar timeframe in minutes. Informational only for the reader.
; AmiBroker controls actual bar size via Analysis > Periodicity.
; Must match the periodicity set in the AmiBroker Analysis window.
timeframe    = 5

; How often (seconds) the bridge polls watch_dir for new bars.
; Recommended: poll_sec <= (timeframe_minutes * 60) / 2
; e.g. 5-min bars -> poll every 2-3 seconds is sufficient.
poll_sec     = 2

; Comma-separated list of symbols to track.
; Leave BLANK to auto-discover and track ALL .csv files AmiBroker creates.
; Example: symbols = NIFTY-FUT,BANKNIFTY-FUT,FINNIFTY-FUT,MIDCPNIFTY-FUT
symbols      =

; Log file directory (rotates: 5 MB x 5 files -> sd_livefeed.log)
log_dir      = D:\SD_System\Logs

; Log verbosity: DEBUG, INFO, WARNING, ERROR
log_level    = INFO

; JSON status file path — same format as fyers_bridge bridge_status.json.
; SD monitoring tools / watchdogs can read this to check bridge health.
status_file  = D:\SD_System\Logs\bridge_status.json
